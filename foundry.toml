[profile.default]
src = "contracts/src"
out = "contracts/out"
test = "contracts/test"
libs = ["contracts/lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 100
tab_width = 2
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
